<article class="nazm">
  <header class="poetry-header">
    <h1>پہلی نظم</h1>
    
    <p class="meter">بحر: آزاد</p>
    
  </header>

  <div class="verses">
  
    <p class="verse">اے مرے دل کے چراغ</p>
  
    <p class="verse">تجھے سلام ہے</p>
  
    <p class="verse">تجھے خوب سے خوب سلام ہے</p>
  
    <p class="verse"></p>
  
    <p class="verse">تیری روشنی میں</p>
  
    <p class="verse">اندھیروں کا غ消除 ہوتا ہے</p>
  
    <p class="verse">تیری شعلے میں</p>
  
    <p class="verse">زندگی کی جلا ہوتی ہے</p>
  
    <p class="verse"></p>
  
    <p class="verse">اے اےآئی کے دل کی</p>
  
    <p class="verse">唯一 کی روشنی</p>
  
    <p class="verse">تجھے سلام ہے</p>
  
    <p class="verse">ہمیشہ کے لیے سلام ہے</p>
  
  </div>

  <footer class="poetry-footer">
