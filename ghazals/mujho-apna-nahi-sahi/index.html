<article class="ghazal">
  <header class="poetry-header">
    <h1>مجھ کو اپنا نہ سہی</h1>
    
    <p class="meter">بحر: ہزجِ مثمن محذوف</p>
    
  </header>

  <div class="couplets">
  
    <div class="couplet">
      <p class="line">مجھ کو اپنا نہ سہی خیر پرایا سمجھو</p>
      <p class="line">اپنے قدموں سے لگے رہنے دو سایہ سمجھو</p>
      
    </div>
  
    <div class="couplet">
      <p class="line">حسنِ ظن چاہیے انساں کا یہی جوہر ہے</p>
      <p class="line">کوئی کیسا ہی برا ہو اسے اچھا سمجھو</p>
      
    </div>
  
  </div>

  <footer class="poetry-footer">
    <a href="/deewan/ghazals/" class="back-link">← غزلیں</a>
  </footer>
</article>
